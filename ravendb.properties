# ============================================================
# ravendb.properties  — YCSB configuration for RavenDB
# Place this file in the YCSB root directory.
# Pass it with:  -P ravendb.properties
# ============================================================

# --- RavenDB connection ---
ravendb.url=http://localhost:8080
ravendb.database=ycsb
ravendb.collection=usertable
ravendb.timeout=10000

# --- YCSB record shape (must match your workload files) ---
fieldcount=20
fieldlength=500

# --- Default operation count for run phase ---
operationcount=100000
